<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLitez</title>
    <!-- Import Google Font - Poppins -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <style>
        /* General Reset and Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #825afb, #6553e5);
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .container header {
            font-size: 2rem;
            color: #333;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .form {
            margin-top: 20px;
        }

        .input-box {
            width: 100%;
            margin-top: 20px;
        }

        .input-box label {
            color: #555;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }

        .input-box input {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            font-size: 1rem;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .input-box input:focus {
            border-color: #825afb;
            outline: none;
            box-shadow: 0 0 8px rgba(130, 106, 251, 0.3);
        }

        .form .column {
            display: flex;
            column-gap: 20px;
        }

        .form .gender-box {
            margin-top: 20px;
        }

        .gender-box h3 {
            color: #333;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .gender-option {
            display: flex;
            align-items: center;
            column-gap: 50px;
            flex-wrap: wrap;
        }

        .gender {
            display: flex;
            align-items: center;
            column-gap: 10px;
        }

        .gender input {
            accent-color: #825afb;
            margin: 0;
        }

        .gender label {
            color: #555;
            cursor: pointer;
        }

        .select-box {
            width: 100%;
            margin-top: 15px;
        }

        .select-box select {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            font-size: 1rem;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            transition: border-color 0.3s;
        }

        .select-box select:focus {
            border-color: #825afb;
            outline: none;
            box-shadow: 0 0 8px rgba(130, 106, 251, 0.3);
        }

        .form button {
            width: 100%;
            height: 55px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 30px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            background: #825afb;
            transition: background 0.3s;
        }

        .form button:hover {
            background: #6543e5;
        }

        .event-list {
            margin-top: 40px;
            text-align: center;
        }

        .event-list h2 {
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .event-list ul {
            list-style: none;
        }

        .event-list ul li {
            background: #f5f5f5;
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            color: #555;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .form .column {
                flex-wrap: wrap;
            }
            
            .form .gender-option {
                row-gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>EventLitez</header>

        <!-- Event Creation Form -->
        <div class="form">
            <form id="eventForm">
                <div class="input-box">
                    <label for="eventName">Event Name:</label>
                    <input type="text" id="eventName" name="eventName" required>
                </div>

                <div class="input-box">
                    <label for="eventDate">Event Date:</label>
                    <input type="date" id="eventDate" name="eventDate" required>
                </div>

                <div class="input-box">
                    <label for="eventTime">Event Time:</label>
                    <input type="time" id="eventTime" name="eventTime" required>
                </div>

                <div class="input-box">
                    <label for="eventLocation">Location:</label>
                    <input type="text" id="eventLocation" name="eventLocation" required>
                </div>

                <button type="submit">Add Event</button>
            </form>
        </div>

        <!-- Event Listing -->
        <div class="event-list">
            <h2>Upcoming Events</h2>
            <ul id="events"></ul>
        </div>
    </div>

    <script>
        // JavaScript for functionality
        document.getElementById('eventForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Get form values
            const eventName = document.getElementById('eventName').value;
            const eventDate = document.getElementById('eventDate').value;
            const eventTime = document.getElementById('eventTime').value;
            const eventLocation = document.getElementById('eventLocation').value;

            // Create a new event entry
            const eventItem = document.createElement('li');
            eventItem.textContent = `${eventName} - ${eventDate} at ${eventTime}, ${eventLocation}`;

            // Add the event to the list
            document.getElementById('events').appendChild(eventItem);

            // Clear the form
            document.getElementById('eventForm').reset();
        });
    </script>
</body>
</html>
